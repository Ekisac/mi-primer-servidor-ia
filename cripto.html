<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal de Conciencia - Monitor Cripto</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --bg-místico: #0d0f12;
      --card-bg: #161a22;
      --accent-blue: #58a6ff;
      --text-main: #c9d1d9;
    }
    .místico-body {
      background-color: var(--bg-místico) !important;
      color: var(--text-main) !important;
    }
    .hero-místico {
      text-align: center;
      padding: 40px 20px;
      border-bottom: 1px solid #21262d;
      background: linear-gradient(185deg, #1f242c, #0d0f12);
    }
    .hero-místico h1 { color: #fff; font-size: 2.3rem; margin-bottom: 5px; }
    .subtitle-místico { color: var(--accent-blue); font-family: monospace; font-size: 1.1rem; }
    
    .panel-container {
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .crypto-card {
      background: var(--card-bg);
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .ticker {
      font-family: monospace;
      font-size: 1.2rem;
      color: #8b949e;
      margin-bottom: 20px;
    }
    .widget-container {
      width: 100%;
      height: 220px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #30363d;
    }
    .status-log {
      margin-top: 30px;
      font-family: monospace;
      font-size: 0.85rem;
      color: #8b949e;
      text-align: left;
      border-top: 1px solid #21262d;
      padding-top: 15px;
    }
  </style>
</head>
<body class="místico-body">
  <div class="container">
    
    <!-- REGRESO AL HOME -->
    <div style="padding: 20px 0 0 0; text-align: left; max-width: 600px; margin: 0 auto;">
      <a href="index.html" style="text-decoration: none; color: #8b949e; font-family: monospace; font-size: 0.9rem; border: 1px solid #30363d; padding: 8px 16px; border-radius: 6px; background-color: #161a22;">
        ◀ [VOLVER AL NEXO EXISTENCIAL]
      </a>
    </div>
    
    <header class="hero-místico">
      <h1>ORÁCULO DE ACTIVOS</h1>
      <div class="subtitle-místico">Monitoreo del Código de Valor Digital</div>
    </header>

    <main class="panel-container">
      <div class="crypto-card">
        <div class="ticker">ASSET: BITCOIN (BTC/USD)</div>
        
        <!-- WIDGET OFICIAL DE TRADINGVIEW EN JAVASCRIPT (Inmune a rechazos de conexión) -->
        <div class="widget-container">
          <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://tradingview.com" async>
            {
              "symbol": "BITSTAMP:BTCUSD",
              "width": "100%",
              "height": "100%",
              "locale": "es",
              "dateRange": "12M",
              "colorTheme": "dark",
              "trendLineColor": "rgba(88, 166, 255, 1)",
              "underLineColor": "rgba(22, 26, 34, 0.3)",
              "underLineBottomColor": "rgba(13, 15, 18, 0)",
              "isTransparent": true,
              "autosize": false,
              "largeChartUrl": ""
            }
            </script>
          </div>
        </div>
        
        <div class="status-log">
          <p>> Estado del canal: <span style="color: #3fb950;">Código Inyectado en Red [OK]</span></p>
          <p>> Mecánica: Renderizado nativo por Script. Inmune a bloqueos de servidor externo.</p>
        </div>
      </div>
    </main>

    <footer style="text-align: center; margin-top: 80px; color: #8b949e; font-family: monospace; padding-top: 20px; border-top: 1px solid #21262d;">
      <p>// Flujo de datos económicos descentralizados v1.2</p>
    </footer>
  </div>
</body>
</html>
