<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oráculo en Bucle</title>
    <!-- Aquí puedes mantener tus estilos CSS idénticos a los de tu captura -->
    <style>
        body { background-color: #0b111e; color: #ffffff; font-family: monospace; padding: 40px; }
        .contenedor { max-width: 600px; margin: 0 auto; background: #111827; padding: 30px; border-radius: 8px; border: 1px solid #1f2937; text-align: center; }
        .precio-grande { font-size: 2.5rem; font-weight: bold; margin: 20px 0; color: #f39c12; }
        .meta-datos { display: flex; justify-content: space-around; margin-top: 20px; font-size: 1.1rem; }
        .positivo { color: #00ff00; }
        .negativo { color: #ff0000; }
    </style>
</head>
<body>

    <div class="contenedor">
        <h2>ORÁCULO EN BUCLE</h2>
        <p>Precio del Bloque JSON en Tiempo Real (BTC/USDT)</p>
        <hr style="border-color: #1f2937;">

        <!-- Contenedores donde se mostrarán los datos dinámicos -->
        <div class="precio-grande" id="btc-precio">$0.00 USD</div>

        <div class="meta-datos">
            <div>Cambio (24H): <span id="btc-cambio">0.00%</span></div>
            <div>Hora (HL): <span id="btc-hora">--:--</span></div>
        </div>
    </div>

    <!-- SCRIPT PARA CONECTAR CON EL BACKEND -->
    <script>
        async function actualizarPrecio() {
            try {
                const respuesta = await fetch('/api/bitcoin-actual');
                const datos = await respuesta.json();
                
                // Asignamos el precio
                document.getElementById('btc-precio').innerText = `$${datos.precio} USD`;
                
                // Asignamos la hora
                document.getElementById('btc-hora').innerText = datos.hora;
                
                // Asignamos el cambio de precio y evaluamos el color (verde o rojo)
                const cambioElem = document.getElementById('btc-cambio');
                cambioElem.innerText = `${datos.cambio}%`;
                
                if (datos.cambio.startsWith('+')) {
                    cambioElem.className = 'positivo';
                } else {
                    cambioElem.className = 'negativo';
                }
            } catch (error) {
                console.error("Error al conectar con el oráculo:", error);
            }
        }

        // Ejecuta inmediatamente al cargar la página en Render
        actualizarPrecio();

        // El navegador actualiza de forma automática cada 3 minutos sin recargar la pantalla
        setInterval(actualizarPrecio, 180000);
    </script>
</body>
</html>
