<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oráculo en Bucle</title>
    <style>
        body { background-color: #0b111e; color: #ffffff; font-family: monospace; padding: 40px; }
        .contenedor { max-width: 600px; margin: 0 auto; background: #111827; padding: 30px; border-radius: 8px; border: 1px solid #1f2937; text-align: center; }
        .precio-grande { font-size: 2.5rem; font-weight: bold; margin: 20px 0; color: #f39c12; }
        .meta-datos { display: flex; justify-content: space-around; margin-top: 20px; font-size: 1.1rem; }
        .positivo { color: #00ff00; }
        .negativo { color: #ff0000; }
    </style>
</head>
<body>

    <div class="contenedor">
        <h2>ORÁCULO EN BUCLE</h2>
        <p>Precio del Bloque JSON en Tiempo Real (BTC/USDT)</p>
        <hr style="border-color: #1f2937;">

        <div class="precio-grande" id="btc-precio">Cargando...</div>

        <div class="meta-datos">
            <div>Cambio (24H): <span id="btc-cambio">--%</span></div>
            <div>Hora (HL): <span id="btc-hora">--:--</span></div>
        </div>
    </div>

    <script>
        async function actualizarPrecioDesdeNavegador() {
            try {
                // El navegador hace la consulta directa evitando el bloqueo de la nube de Render
                const respuesta = await fetch('https://coingecko.com');
                const json = await respuesta.json();
                
                if (!json.bitcoin) throw new Error("Datos incompletos");

                const price = json.bitcoin.usd;
                const change = json.bitcoin.usd_24h_change;
                const ahora = new Date();
                
                const horaFormateada = ahora.toLocaleTimeString('es-VE', { 
                    hour: '2-digit', minute: '2-digit', timeZone: 'America/Caracas' 
                });

                // Inyectamos los datos reales en el HTML de la página
                document.getElementById('btc-precio').innerText = `$${price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} USD`;
                document.getElementById('btc-hora').innerText = horaFormateada;
                
                const cambioElem = document.getElementById('btc-cambio');
                cambioElem.innerText = `${(change >= 0 ? "+" : "") + change.toFixed(2)}%`;
                
                if (change >= 0) {
                    cambioElem.className = 'positivo';
                } else {
                    cambioElem.className = 'negativo';
                }
            } catch (error) {
                document.getElementById('btc-precio').innerText = "Error de Consulta";
                console.error("Error al obtener los datos cripto:", error);
            }
        }

        // Ejecución inmediata y actualización automatizada en segundo plano cada 3 minutos
        actualizarPrecioDesdeNavegador();
        setInterval(actualizarPrecioDesdeNavegador, 180000);
    </script>
</body>
</html>
