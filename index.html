<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal de Conciencia - Home</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --bg-místico: #0d0f12;
      --card-bg: #161a22;
      --accent-blue: #58a6ff;
      --text-main: #c9d1d9;
    }
    .místico-body {
      background-color: var(--bg-místico) !important;
      color: var(--text-main) !important;
    }
    .hero-místico {
      text-align: center;
      padding: 60px 20px;
      border-bottom: 1px solid #21262d;
      background: linear-gradient(185deg, #1f242c, #0d0f12);
    }
    .hero-místico h1 { color: #fff; font-size: 2.3rem; margin-bottom: 5px; }
    .subtitle-místico { color: var(--accent-blue); font-family: monospace; font-size: 1.1rem; }
    
    .menu-container {
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .menu-title {
      font-family: monospace;
      color: #8b949e;
      margin-bottom: 20px;
      border-bottom: 1px solid #21262d;
      padding-bottom: 5px;
    }
    .bitacora-link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card-bg);
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 15px 20px;
      margin-bottom: 15px;
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      transition: all 0.2s ease;
    }
    .bitacora-link:hover {
      border-color: var(--accent-blue);
      box-shadow: 0 0 10px rgba(88, 166, 255, 0.2);
      transform: translateX(5px);
    }
    .bitacora-meta {
      font-family: monospace;
      font-size: 0.85rem;
      color: var(--accent-blue);
    }
  </style>
</head>
<body class="místico-body">
  <div class="container">
    
    <header class="hero-místico">
      <h1>NEXO EXISTENCIAL</h1>
      <div class="subtitle-místico">Índice Central de Memorias y Filosofía</div>
    </header>

    <main class="menu-container">
      <div class="menu-title">// REGISTROS DISPONIBLES</div>

      <!-- ENLACE 1: LECTURA DE MANOS -->

        <span class="bitacora-meta">[EJECUTAR]</span>
      </a>

            <!-- ENLACE 2: MONITOR CRIPTO -->

        <span>Log 02: El Oráculo de Activos (Métricas de Bitcoin en Vivo)</span>
        <span class="bitacora-meta">[EJECUTAR]</span>
      </a>


    </main>

    <footer style="text-align: center; margin-top: 80px; color: #8b949e; font-family: monospace; padding-top: 20px; border-top: 1px solid #21262d;">
      <p>// Sistema Operativo de Conciencia v1.56</p>
    </footer>
  </div>
